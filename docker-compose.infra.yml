services:
  # POSTGRESQL
  postgres:
    image: postgres:15-alpine
    container_name: pd_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pd_network

  # REDIS
  redis:
    image: redis:7-alpine
    container_name: pd_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pd_network

  # KAFKA
  kafka:
    image: apache/kafka:3.7.0
    container_name: pd_kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - pd_network

  # SPARK MASTER
  spark-master:
    image: apache/spark:3.5.0
    container_name: pd_spark_master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[o]rg.apache.spark.deploy.master.Master' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - pd_network

  # SPARK WORKER
  spark-worker:
    image: apache/spark:3.5.0
    container_name: pd_spark_worker
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[o]rg.apache.spark.deploy.worker.Worker' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - pd_network

  # OCR SERVICE
  ocr-service:
    build:
      context: .
      dockerfile: deploy/docker/ocr-service/Dockerfile
    container_name: pd_ocr_service
    restart: unless-stopped
    ports:
      - "${OCR_PORT}:8000"
    environment:
      - OCR_HOST=${OCR_HOST}
      - OCR_PORT=${OCR_PORT}
      - OCR_LOG_LEVEL=${OCR_LOG_LEVEL}
      - OCR_REDIS_URL=${OCR_REDIS_URL}
      - OCR_TESSERACT_LANGS=${OCR_TESSERACT_LANGS}
      - OCR_TESSERACT_PATH=${OCR_TESSERACT_PATH}
      - OCR_MAX_IMAGE_SIZE_MB=${OCR_MAX_IMAGE_SIZE_MB}
      - OCR_MIN_CONFIDENCE=${OCR_MIN_CONFIDENCE}
      - OCR_CACHE_TTL_SECONDS=${OCR_CACHE_TTL_SECONDS}
      - OCR_WORKER_CONCURRENCY=${OCR_WORKER_CONCURRENCY}
    volumes:
      - ocr_cache:/tmp/ocr_cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pd_network

  # OCR WORKER (Celery)
  ocr-worker:
    build:
      context: .
      dockerfile: deploy/docker/ocr-service/Dockerfile
    container_name: pd_ocr_worker
    restart: unless-stopped
    environment:
      - OCR_HOST=${OCR_HOST}
      - OCR_PORT=${OCR_PORT}
      - OCR_LOG_LEVEL=${OCR_LOG_LEVEL}
      - OCR_REDIS_URL=${OCR_REDIS_URL}
      - OCR_TESSERACT_LANGS=${OCR_TESSERACT_LANGS}
      - OCR_TESSERACT_PATH=${OCR_TESSERACT_PATH}
      - OCR_MAX_IMAGE_SIZE_MB=${OCR_MAX_IMAGE_SIZE_MB}
      - OCR_MIN_CONFIDENCE=${OCR_MIN_CONFIDENCE}
      - OCR_CACHE_TTL_SECONDS=${OCR_CACHE_TTL_SECONDS}
      - OCR_WORKER_CONCURRENCY=${OCR_WORKER_CONCURRENCY}
    volumes:
      - ocr_cache:/tmp/ocr_cache
    command: ["celery", "-A", "src.services.ocr.tasks:celery_app", "worker", "--loglevel=info", "--concurrency=${OCR_WORKER_CONCURRENCY}"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [
        "CMD-SHELL",
        "celery -A src.services.ocr.tasks:celery_app inspect ping -d celery@$$HOSTNAME --timeout 5 >/dev/null 2>&1 || exit 1"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - pd_network

volumes:
  pg_data:
  redis_data:
  kafka_data:
  ocr_cache:

networks:
  pd_network:
    driver: bridge
    name: pd_network