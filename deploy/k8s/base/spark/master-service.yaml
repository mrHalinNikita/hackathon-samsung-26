apiVersion: v1
kind: Service
metadata:
  name: pd-spark-master
  namespace: pd-scanner
  labels:
    app: pd-spark-master
spec:
  ports:
    - port: 7077
      targetPort: 7077
      name: spark-master
    - port: 8080
      targetPort: 8080
      name: spark-ui
  selector:
    app: pd-spark-master
  type: ClusterIP